<form id="medicalRecordCreateForm" method="post" action="{% url 'medical_records:record_create' patient.patient_id %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.record_type.id_for_label }}" class="form-label">Record Type <span class="text-danger">*</span></label>
        {{ form.record_type }}
        <div class="invalid-feedback" id="error_record_type"></div>
    </div>
    
    <div class="mb-3">
        <label for="{{ form.title.id_for_label }}" class="form-label">Title <span class="text-danger">*</span></label>
        {{ form.title }}
        <div class="invalid-feedback" id="error_title"></div>
    </div>
    
    <div class="mb-3">
        <label for="{{ form.content.id_for_label }}" class="form-label">Content <span class="text-danger">*</span></label>
        {{ form.content }}
        <div class="invalid-feedback" id="error_content"></div>
        <small class="form-text text-muted">Enter the medical record details</small>
    </div>
    
    <div class="mb-3">
        <label for="{{ form.appointment.id_for_label }}" class="form-label">Related Appointment</label>
        {{ form.appointment }}
        <div class="invalid-feedback" id="error_appointment"></div>
        <small class="form-text text-muted">Optional: Link this record to an appointment</small>
    </div>
</form>
